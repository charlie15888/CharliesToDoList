<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie's ToDo List · sync & timestamp</title>
    <!-- Firebase SDKs -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // REPLACE THIS WITH YOUR ACTUAL FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyB-b_EE5r3uhOyOn0KCKjojP5hsqykE1VY",
            authDomain: "charlies-todo-list.firebaseapp.com",
            projectId: "charlies-todo-list",
            storageBucket: "charlies-todo-list.firebasestorage.app",
            messagingSenderId: "95756004671",
            appId: "1:95756004671:web:c953402a02c6c1c45db78a"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tasksRef = collection(db, "tasks");

        // DOM elements
        const todoListEl = document.getElementById('todoList');
        const progressListEl = document.getElementById('progressList');
        const doneListEl = document.getElementById('doneList');
        const addBtn = document.getElementById('addTaskBtn');
        const newInput = document.getElementById('newTaskInput');
        const dueDateInput = document.getElementById('dueDateInput');

        // Listen for real-time updates from Firebase
        const q = query(tasksRef, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const tasks = [];
            snapshot.forEach(doc => {
                tasks.push({ id: doc.id, ...doc.data() });
            });
            render(tasks);
        });

        // Render all columns
        function render(tasks) {
            todoListEl.innerHTML = '';
            progressListEl.innerHTML = '';
            doneListEl.innerHTML = '';

            tasks.forEach(task => {
                const taskCard = createTaskCard(task);
                if (task.status === 'todo') {
                    todoListEl.appendChild(taskCard);
                } else if (task.status === 'progress') {
                    progressListEl.appendChild(taskCard);
                } else if (task.status === 'done') {
                    doneListEl.appendChild(taskCard);
                }
            });
        }

        // Create a task card
        function createTaskCard(task) {
            const div = document.createElement('div');
            div.className = 'task-card';
            div.dataset.id = task.id;

            const textSpan = document.createElement('span');
            textSpan.className = 'task-text';
            textSpan.textContent = task.text;
            textSpan.setAttribute('contenteditable', 'false');

            // Due date display
            const dateSpan = document.createElement('span');
            dateSpan.className = 'task-date';
            if (task.dueDate) {
                const date = new Date(task.dueDate);
                dateSpan.textContent = `📅 ${date.toLocaleDateString()}`;
                dateSpan.style.fontSize = '0.7rem';
                dateSpan.style.opacity = '0.7';
                dateSpan.style.marginLeft = '0.5rem';
            }

            const textContainer = document.createElement('div');
            textContainer.style.display = 'flex';
            textContainer.style.flexDirection = 'column';
            textContainer.style.flex = '1';
            textContainer.appendChild(textSpan);
            textContainer.appendChild(dateSpan);

            // Double-click to edit
            textSpan.addEventListener('dblclick', async () => {
                const isEditing = textSpan.getAttribute('contenteditable') === 'true';
                if (isEditing) return;
                textSpan.setAttribute('contenteditable', 'true');
                textSpan.focus();
            });

            textSpan.addEventListener('blur', async () => {
                if (textSpan.getAttribute('contenteditable') === 'true') {
                    const newText = textSpan.textContent.trim();
                    if (newText !== '') {
                        const taskRef = doc(db, "tasks", task.id);
                        await updateDoc(taskRef, { text: newText });
                    } else {
                        textSpan.textContent = task.text;
                        textSpan.setAttribute('contenteditable', 'false');
                    }
                }
            });

            textSpan.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    textSpan.blur();
                }
            });

            const btnGroup = document.createElement('div');
            btnGroup.className = 'button-group';

            // Move left
            if (task.status !== 'todo') {
                const leftBtn = document.createElement('button');
                leftBtn.textContent = '←';
                leftBtn.className = 'task-btn';
                leftBtn.addEventListener('click', async () => {
                    let newStatus = task.status;
                    if (task.status === 'progress') newStatus = 'todo';
                    else if (task.status === 'done') newStatus = 'progress';
                    const taskRef = doc(db, "tasks", task.id);
                    await updateDoc(taskRef, { status: newStatus });
                });
                btnGroup.appendChild(leftBtn);
            }

            // Move right
            if (task.status !== 'done') {
                const rightBtn = document.createElement('button');
                rightBtn.textContent = '→';
                rightBtn.className = 'task-btn';
                rightBtn.addEventListener('click', async () => {
                    let newStatus = task.status;
                    if (task.status === 'todo') newStatus = 'progress';
                    else if (task.status === 'progress') newStatus = 'done';
                    const taskRef = doc(db, "tasks", task.id);
                    await updateDoc(taskRef, { status: newStatus });
                });
                btnGroup.appendChild(rightBtn);
            }

            // Delete
            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '🗑️';
            deleteBtn.className = 'task-btn delete-btn';
            deleteBtn.addEventListener('click', async () => {
                const taskRef = doc(db, "tasks", task.id);
                await deleteDoc(taskRef);
            });
            btnGroup.appendChild(deleteBtn);

            div.appendChild(textContainer);
            div.appendChild(btnGroup);
            return div;
        }

        // Add new task with timestamp
        async function addNewTask() {
            const text = newInput.value.trim();
            if (text === '') {
                alert('write something, ghost');
                return;
            }
            
            const dueDate = dueDateInput.value ? new Date(dueDateInput.value).toISOString() : null;
            
            await addDoc(tasksRef, {
                text: text,
                status: 'todo',
                createdAt: new Date().toISOString(),
                dueDate: dueDate
            });
            
            newInput.value = '';
            dueDateInput.value = '';
            newInput.focus();
        }

        addBtn.addEventListener('click', addNewTask);
        newInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addNewTask();
        });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #eef2ff;
            padding: 2rem;
        }

        .kanban {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .add-task {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        #newTaskInput, #dueDateInput {
            padding: 0.75rem 1rem;
            border-radius: 2rem;
            border: 1px solid #334155;
            background: #1e1e2f;
            color: white;
            font-size: 1rem;
        }

        #newTaskInput {
            width: 280px;
        }

        #dueDateInput {
            width: 160px;
        }

        button {
            background: #4a3b7c;
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #6b53b3;
            transform: translateY(-2px);
        }

        .board {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .column {
            flex: 1;
            min-width: 280px;
            background: rgba(30, 30, 47, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 1.25rem;
            border: 1px solid #2d3a5e;
        }

        .column h2 {
            font-size: 1.25rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-height: 200px;
        }

        .task-card {
            background: #262538;
            border-radius: 1rem;
            padding: 0.85rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            border-left: 4px solid #9f7aea;
        }

        .task-text {
            cursor: pointer;
            word-break: break-word;
        }

        .task-text[contenteditable="true"] {
            background: #3a2e62;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            outline: none;
        }

        .button-group {
            display: flex;
            gap: 0.4rem;
        }

        .task-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            border-radius: 0.5rem;
        }

        .task-btn:hover {
            background: #3b325a;
            transform: none;
        }

        .delete-btn {
            color: #ffaaaa;
        }
    </style>
</head>
<body>
    <main class="kanban">
        <header>
            <h1>📋 Charlie's ToDo List</h1>
            <div class="add-task">
                <input type="text" id="newTaskInput" placeholder="what needs doing?">
                <input type="date" id="dueDateInput" placeholder="due date">
                <button id="addTaskBtn">+ add task</button>
            </div>
        </header>

        <div class="board">
            <div class="column" data-status="todo">
                <h2>📝 to do</h2>
                <div class="task-list" id="todoList"></div>
            </div>

            <div class="column" data-status="progress">
                <h2>⚡ in progress</h2>
                <div class="task-list" id="progressList"></div>
            </div>

            <div class="column" data-status="done">
                <h2>✅ done</h2>
                <div class="task-list" id="doneList"></div>
            </div>
        </div>
    </main>
</body>
</html>
